<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เว็บแรกของฉัน</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 150px;
            background-color: #f0f8ff;
        }
        h1 {
            color: #2c3e50;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <h1>สวัสดีชาวโลก! 🌍</h1>
    <p>นี่คือเว็บไซต์ที่สร้างผ่าน GitHub Pages ครั้งแรก</p>
    <button onclick="alert('เยี่ยมมาก! สร้างสำเร็จแล้ว!')">คลิกฉันเลย</button>
</body>
</html>
